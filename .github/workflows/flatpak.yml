name: Flatpak Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flatpak-nightly:
    name: Flatpak (Nightly)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: build-aux/flatpak/org.savebutton.SaveButton.json
          bundle: org.savebutton.SaveButton.flatpak
          cache-key: flatpak-builder-nightly

  flatpak-release:
    name: Flatpak (Release)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: org.savebutton.SaveButton.json
          bundle: org.savebutton.SaveButton.flatpak
          cache-key: flatpak-builder-release-${{ github.sha }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: org.savebutton.SaveButton.flatpak
